defaults:
  - experiment: het_control_experiment
  - algorithm: iddpg
  - task: vmas/sampling
  - model: hetcontrolmlpempirical
  - model@critic_model: layers/mlp
  - _self_

seed: 0
use_action_loss: True
action_loss_lr: 0.00003

model:
  use_cadico: True
  cadico_alpha: 0.3

experiment:
  max_n_frames: 5_000_000

hydra:
  searchpath:
    - pkg://benchmarl/conf
